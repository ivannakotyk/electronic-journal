<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Профіль</title>
    <link rel="stylesheet" href="/assets/css/kpi-campus.css">
</head>

<body>

<main class="main" style="max-width:1100px;margin:0 auto">

    <div class="top">

        <div>
            <h1>Профіль користувача</h1>
            <p>Спільна сторінка для всіх ролей.</p>
        </div>

        <div>
            <button class="btn2" id="home">На головну</button>
            <button class="danger" data-logout>Вийти</button>
        </div>

    </div>
    <section class="section">

        <div class="card">

            <div class="strip"></div>

            <h2>Дані користувача</h2>

            <p>
                <b>ПІБ:</b>
                <span data-name></span>
            </p>

            <p>
                <b>Роль:</b>
                <span data-role></span>
            </p>

            <p>
                <b>ID:</b>
                <span id="uid"></span>
            </p>

        </div>

    </section>

</main>

<div id="toast" class="toast"></div>

<script src="/assets/js/common.js"></script>

<script>
    requireAuth();
    init('');

    qs('#uid').textContent = ses().userId || '—';

    qs('#home').onclick = () =>
        location.href = HOME[ses().role] || '/';
</script>

</body>
</html>
