spring:
    datasource:
      url: jdbc:h2:mem:testdb
      driver-class-name: org.h2.Driver
      username: sa
      password: 1111
    h2:
      console:
        enabled: true
        path: /h2-console
    jpa:
      hibernate:
        ddl-auto: update
      open-in-view: false
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.H2Dialect
    jackson:
      serialization:
        WRITE_DATES_AS_TIMESTAMPS: false

server:
  port: 8080

app:
  jwt:
    secret: 0123456789012345678901234567890123456789012345678901234567890123
    expiration-minutes: 720
