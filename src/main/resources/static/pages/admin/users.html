<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Користувачі</title>

    <link rel="stylesheet" href="/assets/css/kpi-campus.css">
</head>

<body>
<div class="app">

    <aside class="side">
        <div class="brand">
            <div class="mark">KPI</div>

            <div>
                <b>Електронний журнал</b><br>
                <small>Адміністратор</small>
            </div>
        </div>

        <div class="user">
            <b data-name></b><br>
            <span class="role" data-role></span>
        </div>

        <nav class="nav">
            <a data-active="dashboard" href="/pages/admin/dashboard.html">
                🏠 Головна
            </a>

            <a data-active="users" href="/pages/admin/users.html">
                👥 Користувачі
            </a>

            <a data-active="groups" href="/pages/admin/groups.html">
                🏷️ Групи
            </a>

            <a data-active="disciplines" href="/pages/admin/disciplines.html">
                📚 Дисципліни
            </a>

            <a href="/pages/shared/profile.html">
                👤 Профіль
            </a>
        </nav>

        <button class="danger" data-logout>
            Вийти
        </button>
    </aside>

    <main class="main">

        <div class="top">
            <div>
                <h1>Керування користувачами</h1>

                <p>
                    Створення акаунтів студентів, викладачів,
                    адміністраторів та методистів.
                </p>
            </div>
        </div>

        <section class="grid cols2">

            <div class="card">

                <h2>Додати користувача</h2>

                <form id="userForm" class="form">

                    <div class="field">
                        <label>ПІБ</label>
                        <input
                                class="input"
                                name="fullName"
                                required
                        >
                    </div>

                    <div class="field">
                        <label>Логін</label>
                        <input
                                class="input"
                                name="login"
                                required
                        >
                    </div>

                    <div class="field">
                        <label>Email</label>
                        <input
                                class="input"
                                name="email"
                                type="email"
                                required
                        >
                    </div>

                    <div class="field">
                        <label>Пароль</label>
                        <input
                                class="input"
                                name="password"
                                required
                        >
                    </div>

                    <div class="field">
                        <label>Роль</label>

                        <select name="role">
                            <option value="STUDENT">
                                Студент
                            </option>

                            <option value="TEACHER">
                                Викладач
                            </option>

                            <option value="ADMINISTRATOR">
                                Адміністратор
                            </option>

                            <option value="METHODOLOGIST">
                                Методист
                            </option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Група студента</label>

                        <select name="groupId"></select>
                    </div>

                    <div class="field">
                        <label>Посада</label>

                        <input
                                class="input"
                                name="position"
                                placeholder="Доцент"
                        >
                    </div>

                    <div class="field">
                        <label>№ студентського</label>

                        <input
                                class="input"
                                name="studentCardNumber"
                        >
                    </div>

                    <button class="btn full">
                        Створити
                    </button>

                </form>
            </div>

            <!-- RIGHT VISUAL CARD -->

            <div class="card visual-card">

                <div class="visual-glow"></div>

                <div class="visual-glow glow2"></div>

                <img
                        src="/assets/illustrations/graduation hats-rafiki.png"
                        alt="Education illustration"
                        class="visual-illustration"
                >

            </div>

        </section>

        <!-- USERS TABLE -->

        <section class="section card">

            <h2>Усі користувачі</h2>

            <div class="table">
                <table>

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>ПІБ</th>
                        <th>Логін</th>
                        <th>Email</th>
                        <th>Роль</th>
                        <th>Група/посада</th>
                        <th>Дія</th>
                    </tr>
                    </thead>

                    <tbody id="userRows"></tbody>

                </table>
            </div>
        </section>

    </main>
</div>

<div id="toast" class="toast"></div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/admin.js"></script>

<script>
    requireAuth(['ADMINISTRATOR']);
    init('users');
    usersPage();
</script>

</body>
</html>
