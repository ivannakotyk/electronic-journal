<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Зведені звіти</title>
    <link rel="stylesheet" href="/assets/css/kpi-campus.css">
</head>
<body>
<div class="app">
    <aside class="side">
        <div class="brand">
            <div class="mark">KPI</div>
            <div>
                <b>Електронний журнал</b><br>
                <small>Кабінет методиста</small>
            </div>
        </div>
        <div class="user">
            <b data-name></b><br>
            <span class="role" data-role></span>
        </div>
        <nav class="nav">
            <a data-active="dashboard" href="/pages/methodologist/dashboard.html">🏠 Головна</a>
            <a data-active="monitoring" href="/pages/methodologist/monitoring.html">🧭 Моніторинг</a>
            <a data-active="reports" href="/pages/methodologist/reports.html">📈 Зведені звіти</a>
            <a href="/pages/shared/profile.html">👤 Профіль</a>
        </nav>
        <button class="danger" data-logout>Вийти</button>
    </aside>

    <main class="main">
        <div class="top">
            <div>
                <h1>Зведені звіти</h1>
                <p>Формування, перегляд та експорт звітності.</p>
            </div>
        </div>

        <section class="grid cols2">
            <div class="card">
                <h2>Сформувати звіт</h2>
                <form id="reportForm" class="form">
                    <div class="field">
                        <label>Період</label>
                        <input class="input" name="period" value="Зведений звіт 2026" required>
                    </div>
                    <div class="field">
                        <label>Група</label>
                        <select name="groupId" required></select>
                    </div>
                    <div class="field">
                        <label>Дисципліна</label>
                        <select name="disciplineId"></select>
                    </div>
                    <div class="field">
                        <label>Викладач</label>
                        <select name="teacherId"></select>
                    </div>
                    <button class="btn full">Сформувати</button>
                </form>
            </div>

            <div class="card visual-card">
                <div class="visual-glow"></div>
                <div class="visual-glow glow2"></div>
                <img
                        src="/assets/illustrations/boy on graduation-rafiki.png"
                        alt="Education illustration"
                        class="visual-illustration"
                >
            </div>
        </section>

        <section class="section card">
            <h2>Звіти</h2>
            <div class="table">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Період</th>
                        <th>Група</th>
                        <th>Дисципліна</th>
                        <th>Викладач</th>
                        <th>Експорт</th>
                    </tr>
                    </thead>
                    <tbody id="reportsRows"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<div id="toast" class="toast"></div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/methodologist.js"></script>
<script>
    requireAuth(['METHODOLOGIST']);
    init('reports');
    methodReports();
</script>
</body>
</html>
